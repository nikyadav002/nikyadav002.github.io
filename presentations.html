<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nikhil Singh | Presentations</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="stylesheet" href="./assets/css/creative.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        .presentation-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg); overflow: hidden;
            max-width: 900px; margin: 0 auto 40px;
            box-shadow: var(--shadow-md); backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .presentation-card:hover { box-shadow: var(--shadow-lg), 0 0 30px var(--glow-color); }
        .slide-viewer { position: relative; background: #0a0a1a; cursor: pointer; overflow: hidden; }
        .slide-viewer canvas { display: block; width: 100%; height: auto; }
        .slide-nav {
            position: absolute; top: 0; height: 100%; width: 15%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease; z-index: 10;
            cursor: pointer; border: none; background: none; padding: 0;
        }
        .slide-nav:hover { opacity: 1; }
        .slide-nav i {
            font-size: 2rem; color: white;
            background: rgba(99,102,241,0.5); width: 50px; height: 50px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px); transition: all 0.2s ease;
        }
        .slide-nav:hover i { transform: scale(1.1); box-shadow: 0 0 20px rgba(99,102,241,0.4); }
        .slide-prev { left: 0; }
        .slide-next { right: 0; }
        .slide-controls {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            padding: 14px 20px; background: var(--surface); border-top: 1px solid var(--border);
        }
        .slide-controls button {
            background: none; border: 1px solid var(--glass-border); color: var(--text);
            width: 38px; height: 38px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; transition: all 0.25s ease;
        }
        .slide-controls button:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--primary), var(--glow));
            color: white; border-color: transparent; transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99,102,241,0.3);
        }
        .slide-controls button:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-indicator { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--text-muted); min-width: 80px; text-align: center; }
        .fullscreen-btn { margin-left: auto; }
        .presentation-info { padding: 20px 25px; }
        .presentation-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; color: var(--text); }
        .presentation-meta { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; font-size: 0.85rem; color: var(--text-muted); }
        .presentation-meta span { display: flex; align-items: center; gap: 6px; }
        .presentation-meta i { color: var(--primary); font-size: 0.9rem; }
        .slide-progress { height: 3px; background: var(--border); position: relative; }
        .slide-progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--glow)); transition: width 0.3s ease; border-radius: 0 2px 2px 0; }
        .slide-viewer.fullscreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 3000; display: flex; align-items: center; justify-content: center; background: #000; }
        .slide-viewer.fullscreen canvas { max-width: 100%; max-height: 100%; width: auto; }
        .slide-viewer.fullscreen .slide-nav { width: 10%; }
        .fullscreen-close { display: none; position: fixed; top: 20px; right: 20px; z-index: 3001; background: rgba(99,102,241,0.6); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; backdrop-filter: blur(4px); }
        .slide-viewer.fullscreen~.fullscreen-close { display: flex; align-items: center; justify-content: center; }
        .slide-loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #0a0a1a; z-index: 5; }
        .slide-loading .loader-spinner { border-top-color: var(--primary); }
        @media (max-width: 768px) {
            .presentation-card { border-radius: 14px; margin: 0 auto 30px; }
            .slide-nav i { width: 36px; height: 36px; font-size: 1.2rem; }
            .slide-controls { gap: 12px; padding: 10px 15px; }
            .presentation-info { padding: 15px 18px; }
            .presentation-title { font-size: 1.1rem; }
        }
    </style>
</head>

<body>
    <canvas id="crystal-bg"></canvas>
    <div class="page-loader" id="pageLoader"><div class="loader-spinner"></div></div>

    <nav class="navbar" id="navbar">
        <a href="index.html" style="font-family: 'Space Grotesk'; font-weight: 700; font-size: 1.5rem; text-decoration: none; color: inherit;">NS.</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="publications.html">Publications</a></li>
            <li><a href="cv.html">CV</a></li>
            <li><a href="experience.html">Teaching</a></li>
            <li><a href="presentations.html" class="active">Presentations</a></li>
            <li><a href="software.html">Software</a></li>
            <li><a href="gallery.html">Gallery</a></li>
        </ul>
        <button id="theme-toggle" class="social-btn" style="width: 35px; height: 35px;"><i class="fas fa-sun"></i></button>
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </nav>

    <div class="section-container" style="padding-top: 100px;">
        <h1 class="section-title">Presentations</h1>
        <div style="max-width: 900px; margin: 40px auto 0;">
            <div class="presentation-card" id="pres-2">
                <div class="slide-viewer" id="viewer-2">
                    <div class="slide-loading" id="loading-2"><div class="loader-spinner"></div></div>
                    <canvas id="canvas-2"></canvas>
                    <button class="slide-nav slide-prev" onclick="changeSlide('2', -1)"><i class="fas fa-chevron-left"></i></button>
                    <button class="slide-nav slide-next" onclick="changeSlide('2', 1)"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="slide-progress"><div class="slide-progress-bar" id="progress-2"></div></div>
                <div class="slide-controls">
                    <button onclick="changeSlide('2', -1)" id="prev-btn-2"><i class="fas fa-chevron-left"></i></button>
                    <span class="page-indicator" id="page-info-2">1 / ?</span>
                    <button onclick="changeSlide('2', 1)" id="next-btn-2"><i class="fas fa-chevron-right"></i></button>
                    <button class="fullscreen-btn" onclick="toggleFullscreen('2')" title="Fullscreen"><i class="fas fa-expand"></i></button>
                </div>
                <div class="presentation-info">
                    <div class="presentation-title">MATSUS 2026 Spring</div>
                    <div class="presentation-meta">
                        <span><i class="fas fa-calendar"></i> 2026</span>
                        <span><i class="fas fa-file-pdf"></i> <a href="./assets/presentations/MATSUS_2026_Spring.pdf" target="_blank" style="color: var(--primary); text-decoration: none;">Download PDF</a></span>
                    </div>
                </div>
            </div>
            <div class="presentation-card" id="pres-1">
                <div class="slide-viewer" id="viewer-1">
                    <div class="slide-loading" id="loading-1"><div class="loader-spinner"></div></div>
                    <canvas id="canvas-1"></canvas>
                    <button class="slide-nav slide-prev" onclick="changeSlide('1', -1)"><i class="fas fa-chevron-left"></i></button>
                    <button class="slide-nav slide-next" onclick="changeSlide('1', 1)"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="slide-progress"><div class="slide-progress-bar" id="progress-1"></div></div>
                <div class="slide-controls">
                    <button onclick="changeSlide('1', -1)" id="prev-btn-1"><i class="fas fa-chevron-left"></i></button>
                    <span class="page-indicator" id="page-info-1">1 / ?</span>
                    <button onclick="changeSlide('1', 1)" id="next-btn-1"><i class="fas fa-chevron-right"></i></button>
                    <button class="fullscreen-btn" onclick="toggleFullscreen('1')" title="Fullscreen"><i class="fas fa-expand"></i></button>
                </div>
                <div class="presentation-info">
                    <div class="presentation-title">Generative Modelling</div>
                    <div class="presentation-meta">
                        <span><i class="fas fa-calendar"></i> 2026</span>
                        <span><i class="fas fa-file-pdf"></i> <a href="./assets/presentations/generative-modelling.pdf" target="_blank" style="color: var(--primary); text-decoration: none;">Download PDF</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="https://scholar.google.com/citations?user=HzuwXBMAAAAJ&hl=en" target="_blank"><i class="fas fa-graduation-cap"></i></a>
            <a href="https://github.com/nikyadav002" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://www.linkedin.com/in/nikhilsingh002" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="https://orcid.org/0009-0007-4990-8748" target="_blank"><i class="fab fa-orcid"></i></a>
            <a href="https://x.com/nikyadav002" target="_blank"><i class="fab fa-x-twitter"></i></a>
        </div>
        <p style="color: var(--text-muted); font-size: 0.9rem;">&copy; 2026 Nikhil Singh</p>
    </footer>

    <button class="scroll-top" id="scrollTop"><i class="fas fa-arrow-up"></i></button>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const presentations = {};
        async function loadPresentation(id, url) {
            try {
                const pdf = await pdfjsLib.getDocument(url).promise;
                presentations[id] = { pdf, currentPage: 1, totalPages: pdf.numPages, rendering: false };
                document.getElementById(`page-info-${id}`).textContent = `1 / ${pdf.numPages}`;
                document.getElementById(`progress-${id}`).style.width = `${(1 / pdf.numPages) * 100}%`;
                await renderPage(id, 1);
                document.getElementById(`loading-${id}`).style.display = 'none';
                updateButtons(id);
            } catch (err) {
                console.error('Error loading PDF:', err);
                document.getElementById(`loading-${id}`).innerHTML = '<p style="color: #ff6b6b;">Failed to load presentation</p>';
            }
        }
        async function renderPage(id, pageNum) {
            const pres = presentations[id]; if (pres.rendering) return; pres.rendering = true;
            const page = await pres.pdf.getPage(pageNum);
            const canvas = document.getElementById(`canvas-${id}`);
            const ctx = canvas.getContext('2d');
            const viewport = page.getViewport({ scale: 2 });
            canvas.width = viewport.width; canvas.height = viewport.height;
            await page.render({ canvasContext: ctx, viewport }).promise;
            pres.rendering = false;
        }
        function changeSlide(id, delta) {
            const pres = presentations[id]; if (!pres) return;
            const newPage = pres.currentPage + delta;
            if (newPage < 1 || newPage > pres.totalPages) return;
            pres.currentPage = newPage;
            document.getElementById(`page-info-${id}`).textContent = `${newPage} / ${pres.totalPages}`;
            document.getElementById(`progress-${id}`).style.width = `${(newPage / pres.totalPages) * 100}%`;
            renderPage(id, newPage); updateButtons(id);
        }
        function updateButtons(id) {
            const pres = presentations[id];
            document.getElementById(`prev-btn-${id}`).disabled = pres.currentPage <= 1;
            document.getElementById(`next-btn-${id}`).disabled = pres.currentPage >= pres.totalPages;
        }
        function toggleFullscreen(id) {
            const viewer = document.getElementById(`viewer-${id}`);
            if (viewer.classList.contains('fullscreen')) { viewer.classList.remove('fullscreen'); document.body.style.overflow = ''; }
            else { viewer.classList.add('fullscreen'); document.body.style.overflow = 'hidden'; }
        }
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeSlide('1', 1);
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changeSlide('1', -1);
            if (e.key === 'Escape') { document.querySelectorAll('.slide-viewer.fullscreen').forEach(v => { v.classList.remove('fullscreen'); document.body.style.overflow = ''; }); }
        });
        window.addEventListener('load', () => { document.getElementById('pageLoader').classList.add('hidden'); loadPresentation('2', './assets/presentations/MATSUS_2026_Spring.pdf'); loadPresentation('1', './assets/presentations/generative-modelling.pdf'); });

        const toggleBtn = document.getElementById('theme-toggle');
        const icon = toggleBtn.querySelector('i');
        let isDark = localStorage.getItem('theme') === 'dark';
        function updateTheme() { document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light'); icon.className = isDark ? 'fas fa-moon' : 'fas fa-sun'; }
        toggleBtn.addEventListener('click', () => { isDark = !isDark; localStorage.setItem('theme', isDark ? 'dark' : 'light'); updateTheme(); });
        updateTheme();
        const hamburger = document.getElementById('hamburger'); const navLinks = document.querySelector('.nav-links');
        hamburger.addEventListener('click', () => { hamburger.classList.toggle('active'); navLinks.classList.toggle('active'); });
        navLinks.querySelectorAll('a').forEach(link => { link.addEventListener('click', () => { hamburger.classList.remove('active'); navLinks.classList.remove('active'); }); });
        window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50));
        const scrollTopBtn = document.getElementById('scrollTop');
        window.addEventListener('scroll', () => scrollTopBtn.classList.toggle('visible', window.scrollY > 400));
        scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    </script>
    <script src="./assets/js/crystal-bg.js"></script>
</body>
</html>
